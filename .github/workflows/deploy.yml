name: Push 기반 CI/CD 테스트

# 트리거 지정, CI/CD가 작동하게 되는 원인, 이벤트등 정의
# container 브랜치에서 push 이벤트(리슨->on)가 발생되면 아래 설정한 내용되고 작동한다!!
on:
  push:
    branches: ["container"]


jobs:
  # app 관련 이미지 생성 허브에 푸시 (소스코드/리소스가 모두 포함)
  ci:
    runs-on:  ubuntu-latest
    steps:
      - name: 코드 checkout
        uses: actions/checkout@v3
      # 도커허브 로그인 -> ID/PW
      # 시크릿 변수 DOCKER_USERNAME, DOCKER_PASSWORD 생성
      - name: Docker hub login
        uses: docker/login-action@v2
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
          
      # fastapi app에 대한 이미지 빌드 푸시 동시 진행
      - name: Build and Push fastapi app
        uses: docker/build-push-action@v4
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{secrets.DOCKER_USERNAME}}/fastapi-app:1.1
      
      # 사용자명/nginx-proxy:1.0형태로 이미지 빌드 푸시
      - name: Build and Push nginx proxy
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{secrets.DOCKER_USERNAME}}/nginx-proxy:1.0


  # EC2 docker=compose.yml, 설정 파일등 copy,  docker-compose 작동
  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      # 1.소스코드 체크아웃
      - name: 코드 checkout
        uses: actions/checkout@v3
      
      # 2. 카피 docker-compose.yml
      - name: docker-compose.yml to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: docker-compose.yaml
          target: "/home/ubuntu"

      - name: Run Script And Service Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            # 작업디렉토리 이동(docker-compsoe.yml이 존재하는 위치로)
            cd /home/ubuntu
            # 필요시 .env 생성 -> 시크릿 변수 읽어서 파일처리(여기서는 생략)
            # 최신 이미지 가져오기
            docker-compose pull
            docker-compose up -d
            # 이미지가 최신으로 교체되면 기존 것 가비지가 되어 공간만 차지함
            docker image prune -f
      - name: 배포 파일 확인
        run: |
          pwd
          ls -al
          test -f docker-compose.yaml

      